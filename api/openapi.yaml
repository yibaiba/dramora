  /api/v1/events/stream:
    get:
      summary: Stream server-sent workflow and job events
      responses:
        "200":
          description: SSE stream
  /api/v1/agents/stream:
    post:
      summary: Run a single LLM agent and stream the response as Server-Sent Events
      description: |
        Body must include `role` and `source_text`. Optional `context` map injects
        prior agent outputs (keyed by role) so dependent agents (e.g. screenwriter)
        can run without spinning up the full workflow. The response is an
        `text/event-stream` with frames `event: delta` (incremental tokens),
        `event: done` (final result), or `event: error`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role, source_text]
              properties:
                role:
                  type: string
                  example: story_analyst
                source_text:
                  type: string
                context:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: SSE stream of agent tokens followed by a final done frame
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid request body
        "503":
          description: Agent service is not configured
  /api/v1/admin/providers:
    get:
      summary: List configured provider endpoints
      responses:
        "200":
          description: Provider config list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderConfig"
  "/api/v1/admin/providers:save":
    post:
      summary: Save a provider endpoint configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProviderConfigRequest"
      responses:
        "200":
          description: Saved provider config
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    $ref: "#/components/schemas/ProviderConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/admin/providers/{capability}:test":
    post:
      summary: Test connectivity to a configured provider endpoint
      parameters:
        - name: capability
          in: path
          required: true
          schema:
            type: string
            enum: [chat, image, video, audio]
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  test_result:
                    $ref: "#/components/schemas/TestProviderResult"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/admin/worker-metrics:
    get:
      summary: Snapshot of cross-process worker observability counters (owner/admin)
      description: |
        Returns worker observability counters. When the persistence layer is
        configured, the snapshot is aggregated from the shared store across
        all worker processes (`source: "aggregated"`); otherwise the response
        falls back to the local in-memory snapshot of the API process
        (`source: "local"`).
      responses:
        "200":
          description: Worker metrics snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  worker_metrics:
                    type: object
                    properties:
                      generation_org_unresolved_skips:
                        type: integer
                        format: int64
                      export_org_unresolved_skips:
                        type: integer
                        format: int64
                      last_skip_kind:
                        type: string
                      last_skip_reason:
                        type: string
                      last_skip_at:
                        type: string
                        format: date-time
                      source:
                        type: string
                        enum: [local, aggregated]
        "403":
          description: Forbidden — owner/admin role required
  /api/v1/admin/llm-telemetry:
    get:
      summary: Snapshot of recent LLM provider calls (owner/admin)
      description: |
        Returns an in-process telemetry snapshot covering the last 200 LLM
        provider calls (both `complete` and `stream` modes). The response
        includes per-vendor counts and average duration plus the most recent
        50 events with metadata (vendor / model / role / mode / duration /
        token_count / success / error_message). Bodies (prompt / response)
        are intentionally omitted to avoid PII.
      responses:
        "200":
          description: LLM telemetry snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  llm_telemetry:
                    type: object
                    properties:
                      total_calls:
                        type: integer
                        format: int64
                      success_calls:
                        type: integer
                        format: int64
                      error_calls:
                        type: integer
                        format: int64
                      by_vendor:
                        type: object
                        additionalProperties:
                          type: integer
                          format: int64
                      avg_duration_ms_by_vendor:
                        type: object
                        additionalProperties:
                          type: integer
                          format: int64
                      recent_events:
                        type: array
                        items:
                          type: object
                          properties:
                            started_at:
                              type: string
                              format: date-time
                            vendor:
                              type: string
                            model:
                              type: string
                            role:
                              type: string
                            mode:
                              type: string
                              enum: [complete, stream]
                            duration_ms:
                              type: integer
                              format: int64
                            token_count:
                              type: integer
                              format: int64
                            success:
                              type: boolean
                            error_message:
                              type: string
                      last_event_at:
                        type: string
                        format: date-time
        "403":
          description: Forbidden — owner/admin role required
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorEnvelope"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorEnvelope"
  parameters:
    ProjectID:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    EpisodeID:
      name: episodeId
      in: path
      required: true
      schema:
        type: string
    WorkflowRunID:
      name: workflowRunId
      in: path
      required: true
      schema:
        type: string
    JobID:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    AnalysisID:
      name: analysisId
      in: path
      required: true
      schema:
        type: string
    AssetID:
      name: assetId
      in: path
      required: true
      schema:
        type: string
    GateID:
      name: gateId
      in: path
      required: true
      schema:
        type: string
    ShotID:
      name: shotId
      in: path
      required: true
      schema:
        type: string
    ExportID:
      name: exportId
      in: path
      required: true
      schema:
        type: string
  schemas:
    APIErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    RegisterRequest:
      allOf:
        - $ref: "#/components/schemas/LoginRequest"
        - type: object
          required:
            - display_name
          properties:
            display_name:
              type: string
              minLength: 1
            invitation_token:
              type: string
              description: Optional invitation token; when present the new user joins the inviting organization with the invited role instead of getting a fresh workspace.
    OrganizationInvitation:
      type: object
      required: [id, organization_id, email, role, token, status, expires_at, created_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { type: string, enum: [owner, admin, editor, viewer] }
        token: { type: string }
        status: { type: string, enum: [pending, accepted, revoked] }
        invited_by_user_id: { type: string, format: uuid, nullable: true }
        expires_at: { type: string, format: date-time }
        accepted_at: { type: string, format: date-time, nullable: true }
        accepted_by_user_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
    CreateInvitationRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        role:
          type: string
          enum: [owner, admin, editor, viewer]
          default: editor
    InvitationAuditEvent:
      type: object
      required: [id, organization_id, invitation_id, action, email, role, created_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        invitation_id: { type: string, format: uuid }
        action:
          type: string
          enum: [created, accepted, revoked, resent]
        actor_user_id: { type: string, format: uuid, nullable: true }
        actor_email: { type: string, nullable: true }
        email: { type: string, format: email }
        role: { type: string, enum: [owner, admin, editor, viewer] }
        note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    CreateEpisodeRequest:
      type: object
      required:
        - title
      properties:
        number:
          type: integer
          minimum: 1
          description: Optional; omitted or zero chooses the next episode number.
        title:
          type: string
          minLength: 1
    ApprovalGateReviewRequest:
      type: object
      properties:
        reviewed_by:
          type: string
          description: Optional reviewer display name; defaults to studio.
        review_note:
          type: string
          description: Optional human review note.
    CreateStorySourceRequest:
      type: object
      required:
        - content_text
      properties:
        source_type:
          type: string
          enum: [idea, outline, novel, script, file, url]
          default: novel
        title:
          type: string
        content_text:
          type: string
          minLength: 1
          maxLength: 20000
        language:
          type: string
          default: zh-CN
    AuthUser:
      type: object
      required:
        - id
        - email
        - display_name
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
    AuthSession:
      type: object
      required:
        - token
        - user
        - organization_id
        - role
        - expires_at
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
        organization_id:
          type: string
        role:
          type: string
        expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
        refresh_expires_at:
          type: string
          format: date-time
        current_session_id:
          type: string
          description: ID of the refresh-token row issued for this session (use with /auth/sessions/{id}:revoke).
    Session:
      type: object
      required:
        - id
        - organization_id
        - role
        - created_at
        - expires_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        replaced_by_id:
          type: string
    Project:
      type: object
      required:
        - id
        - organization_id
        - name
        - description
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, active, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Episode:
      type: object
      required:
        - id
        - project_id
        - number
        - title
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        number:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [draft, planning, generating, editing, exported, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkflowRun:
      type: object
      required:
        - id
        - project_id
        - episode_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        status:
          type: string
          enum: [draft, running, waiting_approval, succeeded, failed, canceled]
        checkpoint_summary:
          $ref: "#/components/schemas/WorkflowCheckpointSummary"
        node_runs:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNodeRun"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkflowCheckpointSummary:
      type: object
      required:
        - sequence
        - saved_at
        - completed_nodes
        - waiting_nodes
        - running_nodes
        - failed_nodes
        - skipped_nodes
        - blackboard_roles
      properties:
        sequence:
          type: integer
          format: int64
        saved_at:
          type: string
          format: date-time
        completed_nodes:
          type: integer
        waiting_nodes:
          type: integer
        running_nodes:
          type: integer
        failed_nodes:
          type: integer
        skipped_nodes:
          type: integer
        blackboard_roles:
          type: array
          items:
            type: string
    WorkflowNodeRun:
      type: object
      required:
        - node_id
        - kind
        - status
        - summary
        - highlights
        - error_message
        - upstream_node_ids
      properties:
        node_id:
          type: string
        kind:
          type: string
        status:
          type: string
          enum: [pending, running, waiting_approval, succeeded, failed, skipped, canceled]
        summary:
          type: string
        highlights:
          type: array
          items:
            type: string
        error_message:
          type: string
        upstream_node_ids:
          type: array
          items:
            type: string
    GenerationJob:
      type: object
      required:
        - id
        - project_id
        - episode_id
        - workflow_run_id
        - provider
        - model
        - task_type
        - status
        - result_asset_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        workflow_run_id:
          type: string
        provider:
          type: string
        model:
          type: string
        task_type:
          type: string
        status:
          type: string
          enum:
            - draft
            - preflight
            - queued
            - submitting
            - submitted
            - polling
            - downloading
            - postprocessing
            - needs_review
            - succeeded
            - blocked
            - failed
            - timed_out
            - canceling
            - canceled
        result_asset_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApprovalGate:
      type: object
      required:
        - id
        - project_id
        - episode_id
        - workflow_run_id
        - gate_type
        - subject_type
        - subject_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
