openapi: 3.1.0
info:
  title: Manmu API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: API process is alive
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: API dependencies are ready
  /api/v1/meta/capabilities:
    get:
      summary: List enabled API capabilities
      responses:
        "200":
          description: Capability list
  /api/v1/projects:
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/projects/{projectId}:
    get:
      summary: Get project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/projects/{projectId}/episodes:
    get:
      summary: List project episodes
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Episode list
          content:
            application/json:
              schema:
                type: object
                properties:
                  episodes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Episode"
    post:
      summary: Create project episode
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEpisodeRequest"
      responses:
        "201":
          description: Created episode
          content:
            application/json:
              schema:
                type: object
                properties:
                  episode:
                    $ref: "#/components/schemas/Episode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}:
    get:
      summary: Get episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Episode detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  episode:
                    $ref: "#/components/schemas/Episode"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-analysis/start:
    post:
      summary: Start story analysis workflow for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "202":
          description: Story analysis workflow accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_run:
                    $ref: "#/components/schemas/WorkflowRun"
                  generation_job:
                    $ref: "#/components/schemas/GenerationJob"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-analyses:
    get:
      summary: List completed story analysis artifacts for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Story analysis list
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_analyses:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoryAnalysis"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/story-analyses/{analysisId}:
    get:
      summary: Get story analysis artifact
      parameters:
        - $ref: "#/components/parameters/AnalysisID"
      responses:
        "200":
          description: Story analysis detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_analysis:
                    $ref: "#/components/schemas/StoryAnalysis"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/approval-gates:
    get:
      summary: List human approval gates for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Approval gate list
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gates:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalGate"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/approval-gates:seed:
    post:
      summary: Seed human approval gates from current episode artifacts
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "201":
          description: Seeded approval gates
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gates:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalGate"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/approval-gates/{gateId}:approve:
    post:
      summary: Approve a pending human gate
      parameters:
        - $ref: "#/components/parameters/GateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalGateReviewRequest"
      responses:
        "200":
          description: Approved approval gate
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gate:
                    $ref: "#/components/schemas/ApprovalGate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/approval-gates/{gateId}:request-changes:
    post:
      summary: Request changes for a pending human gate
      parameters:
        - $ref: "#/components/parameters/GateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalGateReviewRequest"
      responses:
        "200":
          description: Approval gate with changes requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gate:
                    $ref: "#/components/schemas/ApprovalGate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-map:
    get:
      summary: Get character, scene, and prop maps for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Story map detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_map:
                    $ref: "#/components/schemas/StoryMap"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-map:seed:
    post:
      summary: Seed character, scene, and prop maps from latest story analysis
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "201":
          description: Seeded story map
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_map:
                    $ref: "#/components/schemas/StoryMap"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/storyboard-shots:
    get:
      summary: List storyboard shot cards for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Storyboard shot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  storyboard_shots:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoryboardShot"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/storyboard-shots:seed:
    post:
      summary: Seed storyboard shot cards from latest story analysis and scene map
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "201":
          description: Seeded storyboard shot cards
          content:
            application/json:
              schema:
                type: object
                properties:
                  storyboard_shots:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoryboardShot"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/storyboard-shots/{shotId}/prompt-pack:
    get:
      summary: Get the latest provider-specific prompt pack for a storyboard shot
      parameters:
        - $ref: "#/components/parameters/ShotID"
      responses:
        "200":
          description: Shot prompt pack
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt_pack:
                    $ref: "#/components/schemas/ShotPromptPack"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/storyboard-shots/{shotId}/prompt-pack:generate:
    post:
      summary: Generate an SD2 fast prompt pack for a storyboard shot
      parameters:
        - $ref: "#/components/parameters/ShotID"
      responses:
        "201":
          description: Generated shot prompt pack
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt_pack:
                    $ref: "#/components/schemas/ShotPromptPack"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/storyboard-shots/{shotId}/videos:generate:
    post:
      summary: Queue a video generation job from the shot prompt pack
      parameters:
        - $ref: "#/components/parameters/ShotID"
      responses:
        "202":
          description: Video generation job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  generation_job:
                    $ref: "#/components/schemas/GenerationJob"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/assets:
    get:
      summary: List asset candidates for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Episode asset candidates
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Asset"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/assets:seed:
    post:
      summary: Seed asset candidates from the episode C/S/P map
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "201":
          description: Seeded asset candidates
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Asset"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/assets/{assetId}:lock:
    post:
      summary: Lock an asset candidate as ready reference material
      parameters:
        - $ref: "#/components/parameters/AssetID"
      responses:
        "200":
          description: Locked asset
          content:
            application/json:
              schema:
                type: object
                properties:
                  asset:
                    $ref: "#/components/schemas/Asset"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/workflow-runs/{workflowRunId}:
    get:
      summary: Get workflow run
      parameters:
        - $ref: "#/components/parameters/WorkflowRunID"
      responses:
        "200":
          description: Workflow run detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_run:
                    $ref: "#/components/schemas/WorkflowRun"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/generation-jobs:
    get:
      summary: List generation jobs
      responses:
        "200":
          description: Generation job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  generation_jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/GenerationJob"
  /api/v1/generation-jobs/{jobId}:
    get:
      summary: Get generation job
      parameters:
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          description: Generation job detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  generation_job:
                    $ref: "#/components/schemas/GenerationJob"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/timeline:
    get:
      summary: Get episode timeline
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Timeline detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeline:
                    $ref: "#/components/schemas/Timeline"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Save episode timeline
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveTimelineRequest"
      responses:
        "200":
          description: Saved timeline
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeline:
                    $ref: "#/components/schemas/Timeline"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/exports:
    post:
      summary: Start an MP4 export job for the current episode timeline
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "202":
          description: Export accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    $ref: "#/components/schemas/Export"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/exports/{exportId}:
    get:
      summary: Get export status
      parameters:
        - $ref: "#/components/parameters/ExportID"
      responses:
        "200":
          description: Export detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    $ref: "#/components/schemas/Export"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/events/stream:
    get:
      summary: Stream server-sent workflow and job events
      responses:
        "200":
          description: SSE stream
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorEnvelope"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorEnvelope"
  parameters:
    ProjectID:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    EpisodeID:
      name: episodeId
      in: path
      required: true
      schema:
        type: string
    WorkflowRunID:
      name: workflowRunId
      in: path
      required: true
      schema:
        type: string
    JobID:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    AnalysisID:
      name: analysisId
      in: path
      required: true
      schema:
        type: string
    AssetID:
      name: assetId
      in: path
      required: true
      schema:
        type: string
    GateID:
      name: gateId
      in: path
      required: true
      schema:
        type: string
    ShotID:
      name: shotId
      in: path
      required: true
      schema:
        type: string
    ExportID:
      name: exportId
      in: path
      required: true
      schema:
        type: string
  schemas:
    APIErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
    CreateEpisodeRequest:
      type: object
      required:
        - title
      properties:
        number:
          type: integer
          minimum: 1
          description: Optional; omitted or zero chooses the next episode number.
        title:
          type: string
          minLength: 1
    ApprovalGateReviewRequest:
      type: object
      properties:
        reviewed_by:
          type: string
          description: Optional reviewer display name; defaults to studio.
        review_note:
          type: string
          description: Optional human review note.
    Project:
      type: object
      required:
        - id
        - organization_id
        - name
        - description
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, active, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Episode:
      type: object
      required:
        - id
        - project_id
        - number
        - title
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        number:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [draft, planning, generating, editing, exported, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkflowRun:
      type: object
      required:
        - id
        - project_id
        - episode_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        status:
          type: string
          enum: [draft, running, waiting_approval, succeeded, failed, canceled]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GenerationJob:
      type: object
      required:
        - id
        - project_id
        - episode_id
        - workflow_run_id
        - provider
        - model
        - task_type
        - status
        - result_asset_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        workflow_run_id:
          type: string
        provider:
          type: string
        model:
          type: string
        task_type:
          type: string
        status:
          type: string
          enum:
            - draft
            - preflight
            - queued
            - submitting
            - submitted
            - polling
            - downloading
            - postprocessing
            - needs_review
            - succeeded
            - blocked
            - failed
            - timed_out
            - canceling
            - canceled
        result_asset_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApprovalGate:
      type: object
      required:
        - id
        - project_id
        - episode_id
        - workflow_run_id
        - gate_type
        - subject_type
        - subject_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        workflow_run_id:
          type: string
        gate_type:
          type: string
          enum:
            - story_direction
            - character_lock
            - scene_lock
            - prop_lock
            - storyboard_approval
            - final_timeline
            - export_approval
        subject_type:
          type: string
        subject_id:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, changes_requested, canceled]
        reviewed_by:
          type: string
        review_note:
          type: string
        reviewed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    StoryAnalysis:
      type: object
      required:
        - id
        - project_id
        - episode_id
        - workflow_run_id
        - generation_job_id
        - version
        - status
        - summary
        - themes
        - character_seeds
        - scene_seeds
        - prop_seeds
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        workflow_run_id:
          type: string
        generation_job_id:
          type: string
        version:
          type: integer
        status:
          type: string
          enum: [generated, approved]
        summary:
          type: string
        themes:
          type: array
          items:
            type: string
        character_seeds:
          type: array
          items:
            type: string
        scene_seeds:
          type: array
          items:
            type: string
        prop_seeds:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    StoryMap:
      type: object
      properties:
        characters:
          type: array
          items:
            $ref: "#/components/schemas/StoryMapItem"
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/StoryMapItem"
        props:
          type: array
          items:
            $ref: "#/components/schemas/StoryMapItem"
    StoryMapItem:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    StoryboardShot:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        scene_id:
          type: string
        code:
          type: string
        title:
          type: string
        description:
          type: string
        prompt:
          type: string
        position:
          type: integer
        duration_ms:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ShotPromptPack:
      type: object
      required:
        - id
        - project_id
        - episode_id
        - shot_id
        - provider
        - model
        - preset
        - task_type
        - direct_prompt
        - negative_prompt
        - time_slices
        - reference_bindings
        - params
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        episode_id:
          type: string
        shot_id:
          type: string
        provider:
          type: string
        model:
          type: string
        preset:
          type: string
        task_type:
          type: string
          enum: [text_to_video, image_to_video, first_last_frame_to_video]
        direct_prompt:
          type: string
        negative_prompt:
          type: string
        time_slices:
          type: array
          items:
            $ref: "#/components/schemas/PromptTimeSlice"
        reference_bindings:
          type: array
          items:
            $ref: "#/components/schemas/PromptReferenceBinding"
        params:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PromptTimeSlice:
      type: object
      required: [start_ms, end_ms, prompt, camera_work, shot_size, visual_focus]
      properties:
        start_ms:
          type: integer
