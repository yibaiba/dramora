openapi: 3.1.0
info:
  title: Manmu API
  version: 0.1.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: API process is alive
  /readyz:
    get:
      summary: Readiness check
      security: []
      responses:
        "200":
          description: API dependencies are ready
  /metrics:
    get:
      summary: Prometheus text exposition for worker metrics
      security: []
      responses:
        "200":
          description: |
            Prometheus 0.0.4 text exposition. Exposes counters
            `dramora_worker_org_unresolved_skips_total{kind=...}` and a
            `dramora_worker_last_skip_*` gauge family describing the latest
            worker org-context resolution failure. Endpoint is intentionally
            unauthenticated; restrict access at the network / proxy layer.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/meta/capabilities:
    get:
      summary: List enabled API capabilities
      security: []
      responses:
        "200":
          description: Capability list
  /api/v1/auth/register:
    post:
      summary: Register a Studio user and start a JWT session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Auth session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/AuthSession"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/auth/login:
    post:
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Auth session
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/AuthSession"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorEnvelope"
  /api/v1/auth/me:
    get:
      summary: Resolve the current JWT session
      responses:
        "200":
          description: Current auth session
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorEnvelope"
  /api/v1/auth/refresh:
    post:
      summary: Rotate a refresh token and issue a new access + refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New session with rotated refresh token
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/AuthSession"
        "401":
          description: Refresh token invalid, expired, or already revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorEnvelope"
  /api/v1/auth/logout:
    post:
      summary: Revoke a refresh token (active logout)
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        "204":
          description: Refresh token revoked (idempotent)
  /api/v1/auth/sessions:
    get:
      summary: List all refresh-token sessions for the current user
      responses:
        "200":
          description: Sessions belonging to the authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorEnvelope"
  "/api/v1/auth/sessions/{sessionId}:revoke":
    post:
      summary: Revoke a refresh-token session belonging to the current user
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session revoked (or already revoked — idempotent)
        "404":
          description: Session not found or owned by another user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorEnvelope"
  /api/v1/organizations/invitations:
    get:
      summary: List invitations for the current organization (owner/admin only)
      responses:
        "200":
          description: Invitation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitations:
                    type: array
                    items: { $ref: "#/components/schemas/OrganizationInvitation" }
        "403":
          description: Caller lacks owner/admin role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
    post:
      summary: Create an invitation for the current organization (owner/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvitationRequest" }
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitation: { $ref: "#/components/schemas/OrganizationInvitation" }
        "400":
          description: Invalid input
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
        "403":
          description: Caller lacks owner/admin role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
  "/api/v1/organizations/invitations/{invitationId}:revoke":
    post:
      summary: Revoke a pending invitation (owner/admin only)
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Invitation revoked (was pending in this organization)
        "403":
          description: Caller lacks owner/admin role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
        "404":
          description: Invitation not found, not pending, or owned by another organization
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
  "/api/v1/organizations/invitations/{invitationId}:resend":
    post:
      summary: Revoke a pending invitation and issue a fresh one with the same email/role (owner/admin only)
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Old invitation revoked; new pending invitation returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitation: { $ref: "#/components/schemas/OrganizationInvitation" }
        "403":
          description: Caller lacks owner/admin role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
        "404":
          description: Invitation not found, not pending, or owned by another organization
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
  /api/v1/organizations/invitations/audit:
    get:
      summary: List invitation audit events for the current organization (owner/admin only)
      parameters:
        - name: limit
          in: query
          required: false
          description: Page size (default 50, max 200).
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          description: Number of items to skip for pagination.
          schema:
            type: integer
            minimum: 0
        - name: action
          in: query
          required: false
          description: Comma-separated list of actions to keep (created, accepted, revoked, resent).
          schema:
            type: string
        - name: email
          in: query
          required: false
          description: Case-insensitive substring match against the audited invitation email.
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: RFC3339 timestamp; only events at or after this time are returned.
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          description: RFC3339 timestamp; only events at or before this time are returned.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Filtered audit events ordered by created_at desc
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/InvitationAuditEvent"
                  has_more:
                    type: boolean
                  limit:
                    type: integer
                  offset:
                    type: integer
        "400":
          description: Invalid query parameter (e.g. since/until not RFC3339)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
        "403":
          description: Caller lacks owner/admin role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
  /api/v1/organizations/invitations/audit/export:
    get:
      summary: Export invitation audit events as CSV or JSON (owner/admin only)
      description: |
        Streams up to 5000 audit events matching the supplied filters as a downloadable
        attachment. The `format` query selects between CSV (default) and JSON. Pagination
        is bypassed; supply `since`/`until`/`action`/`email` to scope the export.
      parameters:
        - name: format
          in: query
          required: false
          description: Output format. Defaults to `csv`.
          schema:
            type: string
            enum: [csv, json]
        - name: action
          in: query
          required: false
          schema: { type: string }
        - name: email
          in: query
          required: false
          schema: { type: string }
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: until
          in: query
          required: false
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Audit events stream
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/InvitationAuditEvent"
                  has_more:
                    type: boolean
                  exported_at:
                    type: string
                    format: date-time
                  event_count:
                    type: integer
                  filter_summary:
                    type: object
                    properties:
                      actions:
                        type: array
                        items: { type: string }
                      email: { type: string }
                      since: { type: string, format: date-time }
                      until: { type: string, format: date-time }
        "400":
          description: Invalid format or filter parameter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
        "403":
          description: Caller lacks owner/admin role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIErrorEnvelope" }
  /api/v1/projects:
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/projects/{projectId}:
    get:
      summary: Get project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/projects/{projectId}/episodes:
    get:
      summary: List project episodes
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Episode list
          content:
            application/json:
              schema:
                type: object
                properties:
                  episodes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Episode"
    post:
      summary: Create project episode
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEpisodeRequest"
      responses:
        "201":
          description: Created episode
          content:
            application/json:
              schema:
                type: object
                properties:
                  episode:
                    $ref: "#/components/schemas/Episode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}:
    get:
      summary: Get episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Episode detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  episode:
                    $ref: "#/components/schemas/Episode"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-analysis/start:
    post:
      summary: Start story analysis workflow for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "202":
          description: Story analysis workflow accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_run:
                    $ref: "#/components/schemas/WorkflowRun"
                  generation_job:
                    $ref: "#/components/schemas/GenerationJob"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-sources:
    get:
      summary: List source story or novel text for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Story source list
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_sources:
                    type: array
                    items:
                      $ref: "#/components/schemas/StorySource"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Create a source story or novel text version for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStorySourceRequest"
      responses:
        "201":
          description: Created story source
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_source:
                    $ref: "#/components/schemas/StorySource"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-analyses:
    get:
      summary: List completed story analysis artifacts for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Story analysis list
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_analyses:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoryAnalysis"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/story-analyses/{analysisId}:
    get:
      summary: Get story analysis artifact
      parameters:
        - $ref: "#/components/parameters/AnalysisID"
      responses:
        "200":
          description: Story analysis detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_analysis:
                    $ref: "#/components/schemas/StoryAnalysis"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/approval-gates:
    get:
      summary: List human approval gates for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Approval gate list
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gates:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalGate"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/approval-gates:seed:
    post:
      summary: Seed human approval gates from current episode artifacts
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "201":
          description: Seeded approval gates
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gates:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalGate"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/production:seed:
    post:
      summary: Seed story map, assets, storyboard, and approval gates in one production command
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "201":
          description: Seeded production artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gates:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalGate"
                  assets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Asset"
                  story_map:
                    $ref: "#/components/schemas/StoryMap"
                  storyboard_shots:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoryboardShot"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/approval-gates/{gateId}:approve:
    post:
      summary: Approve a pending human gate
      parameters:
        - $ref: "#/components/parameters/GateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalGateReviewRequest"
      responses:
        "200":
          description: Approved approval gate
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gate:
                    $ref: "#/components/schemas/ApprovalGate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/approval-gates/{gateId}:request-changes:
    post:
      summary: Request changes for a pending human gate
      parameters:
        - $ref: "#/components/parameters/GateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalGateReviewRequest"
      responses:
        "200":
          description: Approval gate with changes requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gate:
                    $ref: "#/components/schemas/ApprovalGate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/approval-gates/{gateId}:resubmit:
    post:
      summary: Resubmit a changes-requested human gate back to pending
      parameters:
        - $ref: "#/components/parameters/GateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalGateReviewRequest"
      responses:
        "200":
          description: Approval gate moved back to pending
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_gate:
                    $ref: "#/components/schemas/ApprovalGate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-map:
    get:
      summary: Get character, scene, and prop maps for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Story map detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_map:
                    $ref: "#/components/schemas/StoryMap"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/story-map:seed:
    post:
      summary: Seed character, scene, and prop maps from latest story analysis
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "201":
          description: Seeded story map
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_map:
                    $ref: "#/components/schemas/StoryMap"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/story-map-characters/{characterId}/character-bible:save:
    post:
      summary: Save persisted Character Bible fields for a story-map character
      parameters:
        - name: characterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCharacterBibleRequest"
      responses:
        "200":
          description: Updated story-map character
          content:
            application/json:
              schema:
                type: object
                properties:
                  story_map_item:
                    $ref: "#/components/schemas/StoryMapItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/storyboard-workspace:
    get:
      summary: Get the aggregated storyboard workspace read model for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Storyboard workspace detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  storyboard_workspace:
                    $ref: "#/components/schemas/StoryboardWorkspace"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/storyboard-shots:
    get:
      summary: List storyboard shot cards for an episode
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "200":
          description: Storyboard shot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  storyboard_shots:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoryboardShot"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/episodes/{episodeId}/storyboard-shots:seed:
    post:
      summary: Seed storyboard shot cards from latest story analysis and scene map
      parameters:
        - $ref: "#/components/parameters/EpisodeID"
      responses:
        "201":
          description: Seeded storyboard shot cards
          content:
            application/json:
              schema:
                type: object
                properties:
                  storyboard_shots:
                    type: array
                    items:
                      $ref: "#/components/schemas/StoryboardShot"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/storyboard-shots/{shotId}:update:
    post:
      summary: Update editable storyboard shot fields
      parameters:
        - $ref: "#/components/parameters/ShotID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoryboardShotRequest"
      responses:
        "200":
          description: Updated storyboard shot
          content:
            application/json:
              schema:
                type: object
                properties:
                  storyboard_shot:
                    $ref: "#/components/schemas/StoryboardShot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/storyboard-shots/{shotId}/prompt-pack:
    get:
      summary: Get the latest provider-specific prompt pack for a storyboard shot
      parameters:
        - $ref: "#/components/parameters/ShotID"
      responses:
        "200":
          description: Shot prompt pack
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt_pack:
                    $ref: "#/components/schemas/ShotPromptPack"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/storyboard-shots/{shotId}/prompt-pack:generate:
    post:
      summary: Generate an SD2 fast prompt pack for a storyboard shot
      parameters:
